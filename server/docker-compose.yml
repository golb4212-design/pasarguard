services:
  bluepanel-server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bluepanel-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "127.0.0.1:${BLUEPANEL_SERVER_PORT:-8787}:8787"
    volumes:
      - bluepanel_server_data:/data
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:8787/health').then(r=>{if(!r.ok)process.exit(1)}).catch(()=>process.exit(1))"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 15s

volumes:
  bluepanel_server_data:
